[terminal.shell]
program = "/usr/bin/bash"

[font]
normal.family = "RobotoMono Nerd Font Mono"
bold.family = "RobotoMono Nerd Font Mono"
italic.family = "RobotoMono Nerd Font Mono"
bold_italic.family = "RobotoMono Nerd Font Mono"
size = 14.0

[env]
TERM = "xterm-256color"

[window]
padding.x = 10
padding.y = 10
decorations = "None"

[colors.primary]
background = "#15111f"
foreground = "#9cffdf"

[colors.cursor]
text = "#15111f"
cursor = "#c792ea"

[colors.selection]
text = "#f4fff9"
background = "#4b3d66"

[colors.normal]
black = "#3a3448"
red = "#b86a7a"
green = "#8fffc1"
yellow = "#f5a6d6"
blue = "#8ab4f8"
magenta = "#c792ea"
cyan = "#89dceb"
white = "#cfd7e6"

[colors.bright]
black = "#5c5470"
red = "#c98290"
green = "#a8ffd2"
yellow = "#ffc0e4"
blue = "#a3c7ff"
magenta = "#d7a8ff"
cyan = "#9cffdf"
white = "#ffffff"
